name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_android:
    runs-on: ubuntu-latest
    name: Build Android native lib
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        uses: android-actions/setup-android@v2
      - name: Install NDK and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y ndk-build cmake gfortran
      - name: Build libft8 for Android ABIs
        run: |
          mkdir -p libft8_wrapper/build && cd libft8_wrapper/build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=armeabi-v7a \
                -DANDROID_PLATFORM=android-21 ..
          cmake --build .
          # repeat for arm64-v8a and x86_64 if needed
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-lib
          path: libft8_wrapper/build/*.so

  build_ios:
    runs-on: macos-latest
    name: Build iOS native lib
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran via Homebrew
        run: |
          brew install gcc
      - name: Build libft8 for iOS
        run: |
          mkdir -p libft8_wrapper/build && cd libft8_wrapper/build
          cmake -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_NAME=iOS ..
          cmake --build .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-lib
          path: libft8_wrapper/build/*.dylib
